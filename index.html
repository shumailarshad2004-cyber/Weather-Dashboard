<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <section class="weather-card">

            <h1>Weather Dashboard</h1>
            <p class="subtitle">Search live weather information for any city</p>

            <form id="weatherForm" class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name..." required>
                <button type="submit">Search</button>
            </form>

            <div id="statusMessage" class="status-message"></div>

            <section id="weatherContent" class="hidden">

                <div class="current-weather">
                    <div>
                        <h2 id="cityName">City</h2>
                        <p id="weatherCondition">Clear Sky</p>
                    </div>

                    <div class="temperature">
                        <span id="temperature">--</span>°C
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-box">
                        <span>💨</span>
                        <p>Wind Speed</p>
                        <strong id="windSpeed">-- km/h</strong>
                    </div>

                    <div class="detail-box">
                        <span>🌡️</span>
                        <p>Feels Like</p>
                        <strong id="feelsLike">--°C</strong>
                    </div>

                    <div class="detail-box">
                        <span>💧</span>
                        <p>Humidity</p>
                        <strong id="humidity">--%</strong>
                    </div>
                </div>

                <h2 class="forecast-title">3-Day Forecast</h2>

                <div id="forecastContainer" class="forecast-container"></div>

            </section>

        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
